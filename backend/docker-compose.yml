version: "3.9"

services:
  db:
    image: postgres:15
    container_name: merito_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: merito_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: merito_api
    restart: always
    depends_on:
      - db
    ports:
      - "$PORT:$PORT"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/merito_db
      PORT: $PORT
      BRAPI_TOKEN: ${BRAPI_TOKEN}
    command: sh -c "npx prisma migrate deploy && npm run seed && npm start"

volumes:
  postgres_data:
